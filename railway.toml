[build]
builder = "nixpacks"
buildCommand = "mvn clean package -DskipTests"
startCommand = "java -jar target/gm-caffe-site-1.0.0.jar"

[deploy]
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/"
healthcheckTimeout = 300

[variables]
SPRING_PROFILES_ACTIVE = "prod"
DB_HOST = "mysql.railway.internal"
DB_PORT = "3306"
DB_NAME = "railway"
DB_USER = "root"
DB_PASSWORD = "ZFMdFzxPYiHPVcclzgcMpMETplGJBetI"
JAVA_VERSION = "17"
