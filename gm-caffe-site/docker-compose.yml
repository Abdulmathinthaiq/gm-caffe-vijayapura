version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: gm-caffe-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: gm_caffe
      MYSQL_USER: gmcaffe
      MYSQL_PASSWORD: gmcaffepass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # GM Caffe Application
  app:
    build: .
    container_name: gm-caffe-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: gm_caffe
      DB_USER: gmcaffe
      DB_PASSWORD: gmcaffepass
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  mysql_data:
