 <!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - GM Caffe Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f5f5f5; }
        .sidebar { min-height: 100vh; background: #1a1a1a; }
        .sidebar a { color: white; text-decoration: none; padding: 15px 20px; display: block; }
        .sidebar a:hover, .sidebar a.active { background: #ffc107; color: #1a1a1a; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 sidebar p-0">
                <div class="text-center py-3">
                    <h4 class="text-white"><i class="fas fa-mug-hot text-warning"></i> GM Caffe</h4>
                </div>
                <a href="/admin/dashboard"><i class="fas fa-home me-2"></i> Dashboard</a>
                <a href="/admin/menu"><i class="fas fa-coffee me-2"></i> Menu Items</a>
                <a href="/admin/orders"><i class="fas fa-shopping-cart me-2"></i> Orders</a>
                <a href="/admin/reviews"><i class="fas fa-star me-2"></i> Reviews</a>
                <a href="/admin/users" class="active"><i class="fas fa-users me-2"></i> Users</a>
                <a href="/admin/offers"><i class="fas fa-tags me-2"></i> Offers</a>
                <a href="/"><i class="fas fa-globe me-2"></i> View Website</a>
                <a href="/admin/logout"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
            </div>

            <!-- Main Content -->
            <div class="col-md-10 p-4">
                <h2 class="mb-4">User Management</h2>
                
                <!-- Add/Edit Form -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h4>Add/Edit User</h4>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/admin/users/save}" method="post">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Username</label>
                                    <input type="text" name="username" class="form-control" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" name="email" class="form-control" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Password</label>
                                    <input type="password" name="password" class="form-control">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Role</label>
                                    <select name="role" class="form-select">
                                        <option value="USER">User</option>
                                        <option value="ADMIN">Admin</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" name="fullName" class="form-control">
                            </div>
                            <button type="submit" class="btn btn-warning">Save User</button>
                        </form>
                    </div>
                </div>

                <!-- Users Table -->
                <div class="card">
                    <div class="card-header">
                        <h4>All Users</h4>
                    </div>
                    <div class="card-body">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Username</th>
                                    <th>Email</th>
                                    <th>Full Name</th>
                                    <th>Role</th>
                                    <th>Created</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="user : ${users}">
                                    <td th:text="${user.id}">1</td>
                                    <td th:text="${user.username}">admin</td>
                                    <td th:text="${user.email}">admin@gmcaffe.com</td>
                                    <td th:text="${user.fullName}">Admin User</td>
                                    <td>
                                        <span th:class="${user.role == 'ADMIN'} ? 'badge bg-danger' : 'badge bg-primary'" 
                                              th:text="${user.role}">ADMIN</span>
                                    </td>
                                    <td th:text="${#temporals.format(user.createdAt, 'dd-MM-yyyy')}">01-01-2024</td>
                                    <td>
                                        <a th:href="@{/admin/users/delete/{id}(id=${user.id})}" class="btn btn-sm btn-danger" 
                                           onclick="return confirm('Are you sure?')">Delete</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
