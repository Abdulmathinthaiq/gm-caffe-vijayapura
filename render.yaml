services:
  - type: web
    name: gm-caffe
    dockerfilePath: Dockerfile
    region: oregon
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: MYSQLHOST
        sync: false
      - key: MYSQLPORT
        value: "3306"
      - key: MYSQLDATABASE
        value: gm_caffe
      - key: MYSQLUSER
        sync: false
      - key: MYSQLPASSWORD
        sync: false

