# Server Configuration
server.port=${PORT:3000}
server.address=0.0.0.0

# Production Database Configuration - Using H2 File Database
# H2 is a self-contained file-based database that doesn't require external connections
# Data will persist in the ./data/gm_caffe.mv.db file

spring.datasource.url=jdbc:h2:file:./data/gm_caffe;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console - DISABLED for production security
spring.h2.console.enabled=false

# H2 TCP Server (for external connections if needed - disabled for security)
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration (H2 Dialect)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Thymeleaf Configuration
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Static Resources
spring.web.resources.static-locations=classpath:/static/,file:static/

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Custom static files location
upload.path=./static/uploads/

# Production Logging - Minimal verbose
logging.level.com.gmcaffe=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=ERROR
logging.level.com.zaxxer.hikari=WARN
logging.level.org.springframework.web.servlet.HandlerMappingIntrospector=ERROR

# Disable detailed error information in production (security best practice)
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

