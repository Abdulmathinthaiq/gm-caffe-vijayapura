# Server Configuration
server.port=${PORT:8080}
server.address=0.0.0.0

# Production Database Configuration (MySQL - Railway)
# IMPORTANT: These environment variables MUST be set in Railway:
# MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD

# Fallback support: Uses MYSQLHOST if set, otherwise falls back to DB_HOST
# This allows the app to work with both Railway (MYSQL*) and docker-compose (DB_*) conventions
spring.datasource.url=jdbc:mysql://${MYSQLHOST:${DB_HOST}}:${MYSQLPORT:${DB_PORT:3306}}/${MYSQLDATABASE:${DB_NAME}}?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:${DB_USER}}
spring.datasource.password=${MYSQLPASSWORD:${DB_PASSWORD}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# HikariCP Connection Pool settings for production
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate Configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# # H2 Console (disabled for production)
# spring.h2.console.enabled=false

# Thymeleaf Configuration
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Static Resources
spring.web.resources.static-locations=classpath:/static/,file:static/

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Custom static files location
upload.path=./static/uploads/

# Logging (less verbose for production)
logging.level.com.gmcaffe=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=ERROR

# MySQL Debug Logging (Production) - Enable for debugging connection issues
logging.level.com.mysql.cj=INFO
logging.level.com.zaxero.hikari=DEBUG
logging.level.com.zaxero.hikari.pool=DEBUG
logging.level.com.zaxero.hikari.HikariDataSource=DEBUG

# Show detailed error info in response (disable for production)
# server.error.include-message=never
# server.error.include-binding-errors=never
# server.error.include-stacktrace=never
# server.error.include-exception=false

