# Server Configuration
server.port=8080
server.address=0.0.0.0

# H2 Database Configuration (for development/testing)
spring.datasource.url=jdbc:h2:mem:gm_caffe;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=root
spring.datasource.password=root

# H2 Console (accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MySQL Database Configuration (uncomment for production)
# spring.datasource.url=jdbc:mysql://localhost:3306/gm_caffe?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
# spring.datasource.username=root
# spring.datasource.password=root
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Static Resources
spring.web.resources.static-locations=classpath:/static/,file:static/

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Custom static files location
upload.path=./static/uploads/

# Logging
logging.level.com.gmcaffe=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet=DEBUG
logging.level.org.hibernate=INFO

# MySQL Debug Logging (Development)
logging.level.com.mysql.cj=DEBUG
logging.level.com.mysql.cj.jdbc=DEBUG
logging.level.com.mysql.cj.protocol=DEBUG
logging.level.com.mysql.cj.protocol.a=DEBUG
logging.level.com.mysql.cj.exceptions=DEBUG
logging.level.com.zaxero.hikari=DEBUG
logging.level.com.zaxero.hikari.pool=DEBUG
logging.level.com.zaxero.hikari.HikariDataSource=DEBUG

# Show detailed error info in response
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.error.include-exception=true
