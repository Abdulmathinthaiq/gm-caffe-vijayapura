# Server Configuration
server.port=8080
server.address=0.0.0.0

# H2 Database Configuration (for development/testing)
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration (Dev)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# MySQL Database Configuration (for local MySQL)

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/gm_caffe?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true}

spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Thymeleaf Configuration (Dev - no cache)
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Static Resources
spring.web.resources.static-locations=classpath:/static/,file:static/

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Custom static files location
upload.path=./static/uploads/

# Reduced Logging for Development (matches prod quietness)
logging.level.com.gmcaffe=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.web.servlet=INFO
logging.level.org.hibernate=ERROR
logging.level.com.mysql.cj=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.org.springframework.web.servlet.HandlerMappingIntrospector=ERROR

# Profiles
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Dev error details (disabled in prod)
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.error.include-exception=true
# set the Health Check Path to /actuator/health.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.health.db.enabled=false


