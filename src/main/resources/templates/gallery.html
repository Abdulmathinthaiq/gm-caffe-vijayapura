<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Page Title: Keep under 60 characters -->
    <title>GM Cafe Gallery | Photos of Vijayapura Cafe & Coffee</title>
    
    <!-- Meta Description: Keep between 150-160 characters -->
    <meta name="description" content="View gallery photos of GM Cafe Vijayapura Town. See our cozy cafe interior, delicious coffee, tasty snacks, and happy customers in Devanahalli.">
    
    <!-- Keywords: Optional but helpful for some local directories -->
    <meta name="keywords" content="GM Cafe gallery, Vijayapura cafe photos, coffee shop gallery Devanahalli, cafe interior Vijayapura Town, GM Cafe images">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.gmcafe.com/gallery">
    <meta property="og:title" content="GM Cafe Gallery | Photos of Vijayapura Cafe & Coffee">
    <meta property="og:description" content="View gallery photos of GM Cafe Vijayapura Town. See our cozy cafe interior, delicious coffee, and tasty snacks.">
    <meta property="og:image" content="https://www.gmcafe.com/images/gm-cafe-og.jpg">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://www.gmcafe.com/gallery">
    <meta property="twitter:title" content="GM Cafe Gallery | Photos of Vijayapura Cafe & Coffee">
    <meta property="twitter:description" content="View gallery photos of GM Cafe Vijayapura Town. See our cozy cafe interior, delicious coffee, and tasty snacks.">
    <meta property="twitter:image" content="https://www.gmcafe.com/images/gm-cafe-og.jpg">
    
    <!-- Local Business Recommendations -->
    <meta name="robots" content="index, follow">
    <meta name="author" content="GM Cafe Vijayapura">
    <meta name="geo.region" content="IN-KA">
    <meta name="geo.placename" content="Vijayapura">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .gallery-item:hover {
            transform: scale(1.02);
        }
        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
        .gallery-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: white;
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }
        .gallery-item:hover .gallery-caption {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-mug-hot"></i> GM Caffe</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/menu">Menu</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/gallery">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="/reviews">Reviews</a></li>
                    <li class="nav-item"><a class="nav-link" href="/order">Order Online</a></li>
                    <li class="nav-item"><a class="nav-link" href="/contact">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <section class="page-header">
        <div class="container">
            <h1 class="display-3 text-white">Our Gallery</h1>
            <p class="lead text-white">A visual journey through GM Caffe</p>
        </div>
    </section>

    <!-- Gallery Section -->
    <section class="gallery-section py-5">
        <div class="container">
            <!-- Check if gallery items exist from database -->
            <div th:if="${not #lists.isEmpty(galleryItems)}">
                <div class="row g-4">
                    <div class="col-md-4 col-sm-6" th:each="gallery : ${galleryItems}">
                        <div class="gallery-item">
                            <img th:src="${gallery.imageUrl}" th:alt="${gallery.caption}" class="img-fluid rounded">
                            <div class="gallery-caption" th:if="${gallery.caption}">
                                <h5 th:text="${gallery.caption}">Caption</h5>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Fallback static images if no database items -->
            <div th:if="${#lists.isEmpty(galleryItems)}">
                <div class="row g-4">
                    <div class="col-md-4 col-sm-6">
                        <div class="gallery-item">
                            <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=400" alt="Coffee 1" class="img-fluid rounded">
                        </div>
                    </div>
                    <div class="col-md-4 col-sm-6">
                        <div class="gallery-item">
                            <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=400" alt="Coffee 2" class="img-fluid rounded">
                        </div>
                    </div>
                    <div class="col-md-4 col-sm-6">
                        <div class="gallery-item">
                            <img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=400" alt="Coffee 3" class="img-fluid rounded">
                        </div>
                    </div>
                    <div class="col-md-4 col-sm-6">
                        <div class="gallery-item">
                            <img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=400" alt="Coffee 4" class="img-fluid rounded">
                        </div>
                    </div>
                    <div class="col-md-4 col-sm-6">
                        <div class="gallery-item">
                            <img src="https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?w=400" alt="Coffee 5" class="img-fluid rounded">
                        </div>
                    </div>
                    <div class="col-md-4 col-sm-6">
                        <div class="gallery-item">
                            <img src="https://images.unsplash.com/photo-1504639725590-34d0984388bd?w=400" alt="Coffee 6" class="img-fluid rounded">
                        </div>
                    </div>
                    <div class="col-md-4 col-sm-6">
                        <div class="gallery-item">
                            <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348?w=400" alt="Coffee 7" class="img-fluid rounded">
                        </div>
                    </div>
                    <div class="col-md-4 col-sm-6">
                        <div class="gallery-item">
                            <img src="https://images.unsplash.com/photo-1442512595331-e89e73853f31?w=400" alt="Coffee 8" class="img-fluid rounded">
                        </div>
                    </div>
                    <div class="col-md-4 col-sm-6">
                        <div class="gallery-item">
                            <img src="https://images.unsplash.com/photo-1507133750069-bef72f3707a9?w=400" alt="Coffee 9" class="img-fluid rounded">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <img th:src="@{/images/Talent Forge Logo.png}" alt="TalentForge Logo" style="max-width: 100px; height: auto; margin-bottom: 10px;">
            <h5>TalentForge</h5>
            <p>Empowering Businesses Through Technology</p>
            <p>&copy; 2024 GM Caffe. All Rights Reserved. | Made By TalentForge</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/main.js}"></script>
</body>
</html>
