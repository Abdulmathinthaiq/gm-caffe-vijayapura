<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Management - GM Caffe Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f5f5f5; }
        .sidebar { min-height: 100vh; background: #1a1a1a; }
        .sidebar a { color: white; text-decoration: none; padding: 15px 20px; display: block; }
        .sidebar a:hover, .sidebar a.active { background: #ffc107; color: #1a1a1a; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 sidebar p-0">
                <div class="text-center py-3">
                    <h4 class="text-white"><i class="fas fa-mug-hot text-warning"></i> GM Caffe</h4>
                </div>
                <a href="/admin/dashboard"><i class="fas fa-home me-2"></i> Dashboard</a>
                <a href="/admin/menu" class="active"><i class="fas fa-coffee me-2"></i> Menu Items</a>
                <a href="/admin/orders"><i class="fas fa-shopping-cart me-2"></i> Orders</a>
                <a href="/admin/reviews"><i class="fas fa-star me-2"></i> Reviews</a>
                <a href="/admin/users"><i class="fas fa-users me-2"></i> Users</a>
                <a href="/admin/offers"><i class="fas fa-tags me-2"></i> Offers</a>
                <a href="/"><i class="fas fa-globe me-2"></i> View Website</a>
                <a href="/admin/logout"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
            </div>

            <!-- Main Content -->
            <div class="col-md-10 p-4">
                <h2 class="mb-4">Menu Management</h2>
                
                <!-- Add/Edit Form -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h4>Add/Edit Menu Item</h4>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/admin/menu/save}" method="post" th:object="${item}">
                            <input type="hidden" th:field="*{id}">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Item Name</label>
                                    <input type="text" th:field="*{name}" class="form-control" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Category</label>
                                    <select th:field="*{category}" class="form-select">
                                        <option value="Coffee">Coffee</option>
                                        <option value="Tea">Tea</option>
                                        <option value="Cold Drinks">Cold Drinks</option>
                                        <option value="Pizza">Pizza</option>
                                        <option value="Burger">Burger</option>
                                        <option value="Pizza">Fries</option>
                                        <option value="Burger">MockTails</option>
                                        <option value="Pizza">Chicken Leg Piece</option>
                                        <option value="Burger">Milkshake</option>
                                        <option value="Pizza">Sandwiches</option>
                                        <option value="Burger">Veggie snacks</option>

                                    </select>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Price (₹)</label>
                                    <input type="number" th:field="*{price}" class="form-control" step="0.01" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Image URL</label>
                                    <input type="text" th:field="*{imageUrl}" class="form-control" placeholder="https://...">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Description</label>
                                <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                            </div>
                            <div class="mb-3">
                                <div class="form-check">
                                    <input type="checkbox" th:field="*{active}" class="form-check-input" id="isActive">
                                    <label class="form-check-label" for="isActive">Available (Uncheck to mark as Not Available)</label>
                                </div>
                                <div class="form-check">
                                    <input type="checkbox" th:field="*{featured}" class="form-check-input" id="isFeatured">
                                    <label class="form-check-label" for="isFeatured">Featured</label>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-warning">Save Item</button>
                        </form>
                    </div>
                </div>

                <!-- Menu Items List -->
                <div class="card">
                    <div class="card-header">
                        <h4>All Menu Items</h4>
                    </div>
                    <div class="card-body">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Category</th>
                                    <th>Price</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${items}">
                                    <td th:text="${item.id}">1</td>
                                    <td th:text="${item.name}">Coffee</td>
                                    <td th:text="${item.category}">Coffee</td>
                                    <td th:text="'₹' + ${item.price}">₹150</td>
                                    <td>
                                        <span th:class="${item.isActive} ? 'badge bg-success' : 'badge bg-danger'" 
                                              th:text="${item.isActive} ? 'Available' : 'Not Available'">Active</span>
                                    </td>
                                    <td>
                                        <a th:href="@{/admin/menu/edit/{id}(id=${item.id})}" class="btn btn-sm btn-primary">Edit</a>
                                        <a th:href="@{/admin/menu/delete/{id}(id=${item.id})}" class="btn btn-sm btn-danger" 
                                           onclick="return confirm('Are you sure?')">Delete</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
