<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Management - GM Caffe Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f5f5f5; }
        .sidebar { min-height: 100vh; background: #1a1a1a; }
        .sidebar a { color: white; text-decoration: none; padding: 15px 20px; display: block; }
        .sidebar a:hover, .sidebar a.active { background: #ffc107; color: #1a1a1a; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 sidebar p-0">
                <div class="text-center py-3">
                    <h4 class="text-white"><i class="fas fa-mug-hot text-warning"></i> GM Caffe</h4>
                </div>
                <a href="/admin/dashboard"><i class="fas fa-home me-2"></i> Dashboard</a>
                <a href="/admin/menu"><i class="fas fa-coffee me-2"></i> Menu Items</a>
                <a href="/admin/orders"><i class="fas fa-shopping-cart me-2"></i> Orders</a>
                <a href="/admin/reviews" class="active"><i class="fas fa-star me-2"></i> Reviews</a>
                <a href="/admin/users"><i class="fas fa-users me-2"></i> Users</a>
                <a href="/admin/offers"><i class="fas fa-tags me-2"></i> Offers</a>
                <a href="/"><i class="fas fa-globe me-2"></i> View Website</a>
                <a href="/admin/logout"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
            </div>

            <!-- Main Content -->
            <div class="col-md-10 p-4">
                <h2 class="mb-4">Review Management</h2>
                
                <!-- Reviews Table -->
                <div class="card">
                    <div class="card-header">
                        <h4>All Reviews</h4>
                    </div>
                    <div class="card-body">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Customer Name</th>
                                    <th>Email</th>
                                    <th>Rating</th>
                                    <th>Comment</th>
                                    <th>Status</th>
                                    <th>Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="review : ${reviews}">
                                    <td th:text="${review.id}">1</td>
                                    <td th:text="${review.customerName}">John Doe</td>
                                    <td th:text="${review.customerEmail}">john@example.com</td>
                                    <td>
                                        <div class="rating">
                                            <i class="fas fa-star text-warning" th:each="i : ${#numbers.sequence(1, review.rating)}"></i>
                                        </div>
                                    </td>
                                    <td th:text="${#strings.abbreviate(review.comment, 50)}">Great coffee!</td>
                                    <td>
                                        <span th:class="${review.isApproved} ? 'badge bg-success' : 'badge bg-warning'" 
                                              th:text="${review.isApproved} ? 'Approved' : 'Pending'">Pending</span>
                                    </td>
                                    <td th:text="${#temporals.format(review.createdAt, 'dd-MM-yyyy')}">01-01-2024</td>
                                    <td>
                                        <th:block th:if="${!review.isApproved}">
                                            <form th:action="@{/admin/reviews/{id}/approve(id=${review.id})}" method="post" class="d-inline">
                                                <button type="submit" class="btn btn-sm btn-success">Approve</button>
                                            </form>
                                        </th:block>
                                        <form th:action="@{/admin/reviews/{id}/delete(id=${review.id})}" method="post" class="d-inline">
                                            <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure?')">Delete</button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
