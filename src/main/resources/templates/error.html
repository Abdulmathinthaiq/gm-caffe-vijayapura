<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - GM Caffe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-container {
            text-align: center;
            color: white;
            padding: 40px;
        }
        .error-code {
            font-size: 120px;
            font-weight: bold;
            color: #ffc107;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
        .error-title {
            font-size: 32px;
            margin: 20px 0;
        }
        .error-message {
            font-size: 18px;
            color: #ccc;
            margin-bottom: 30px;
        }
        .btn-warning {
            background-color: #ffc107;
            border-color: #ffc107;
            color: #1a1a1a;
            font-weight: 600;
        }
        .btn-warning:hover {
            background-color: #e0a800;
            border-color: #e0a800;
            color: #1a1a1a;
        }
        .error-details {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
            text-align: left;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-container">
            <div class="error-code" th:text="${statusCode}">500</div>
            <h1 class="error-title" th:text="${errorTitle}">Oops! Something went wrong</h1>
            <p class="error-message" th:text="${errorMessage}">An unexpected error occurred</p>
            
            <div class="mt-4">
                <a href="/" class="btn btn-warning btn-lg me-2">
                    <i class="fas fa-home"></i> Go to Home
                </a>
                <a href="javascript:history.back()" class="btn btn-outline-light btn-lg">
                    <i class="fas fa-arrow-left"></i> Go Back
                </a>
            </div>
            
            <!-- Error details for debugging (can be hidden in production) -->
            <div class="error-details" th:if="${exceptionMessage}">
                <h5><i class="fas fa-info-circle"></i> Error Details</h5>
                <p><strong>Exception:</strong> <span th:text="${exceptionType}">Exception</span></p>
                <p><strong>Message:</strong> <span th:text="${exceptionMessage}">Message</span></p>
                <p class="text-muted small">Please contact the administrator if this problem persists.</p>
            </div>
            
            <div class="mt-4 text-muted">
                <p><i class="fas fa-phone"></i> Need help? Call: +91 7899447884</p>
                <p><i class="fas fa-envelope"></i> Email: gmcafevijayapura@gmail.com</p>
            </div>
        </div>
    </div>
</body>
</html>
